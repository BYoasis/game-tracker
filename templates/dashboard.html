<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 游戏竞品追踪看板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .update-time {
            color: #888;
            font-size: 0.9em;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        .game-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .game-card.locke { border-top: 4px solid #ff6b6b; }
        .game-card.palworld { border-top: 4px solid #4ecdc4; }
        .game-card.pokemon { border-top: 4px solid #ffd93d; }
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .game-title {
            font-size: 1.5em;
            font-weight: bold;
        }
        .game-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 500;
        }
        .badge-news { background: rgba(255,107,107,0.2); color: #ff6b6b; }
        .badge-update { background: rgba(78,205,196,0.2); color: #4ecdc4; }
        .badge-ugc { background: rgba(255,217,61,0.2); color: #ffd93d; }
        .section {
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 1em;
            color: #888;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title::before {
            content: '';
            width: 4px;
            height: 16px;
            border-radius: 2px;
        }
        .news-section .section-title::before { background: #ff6b6b; }
        .ugc-section .section-title::before { background: #ffd93d; }
        .social-section .section-title::before { background: #4ecdc4; }
        .item-list {
            list-style: none;
        }
        .item {
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            margin-bottom: 8px;
            transition: background 0.2s;
        }
        .item:hover {
            background: rgba(255,255,255,0.08);
        }
        .item-title {
            font-size: 0.95em;
            margin-bottom: 6px;
            color: #fff;
            text-decoration: none;
            display: block;
        }
        .item-title:hover {
            color: #00d4ff;
        }
        .item-meta {
            font-size: 0.8em;
            color: #666;
            display: flex;
            gap: 15px;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #555;
        }
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 50px;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            margin-bottom: 30px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-label {
            font-size: 0.85em;
            color: #888;
            margin-top: 5px;
        }
        .footer {
            text-align: center;
            padding: 30px;
            color: #555;
            font-size: 0.85em;
            border-top: 1px solid rgba(255,255,255,0.05);
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 游戏竞品追踪看板</h1>
            <p class="update-time">最后更新: {{UPDATE_TIME}}</p>
        </div>
        
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-number">{{TOTAL_ITEMS}}</div>
                <div class="stat-label">总内容数</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">{{NEWS_COUNT}}</div>
                <div class="stat-label">新闻动态</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">{{UGC_COUNT}}</div>
                <div class="stat-label">攻略/二创</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">{{GAMES_COUNT}}</div>
                <div class="stat-label">追踪游戏</div>
            </div>
        </div>

        <div class="games-grid">
            {{GAME_CARDS}}
        </div>

        <div class="footer">
            <p>🤖 由 Coze Agent 自动采集更新 | 每小时刷新</p>
            <p>数据来源: 搜索引擎 + 官方RSS</p>
        </div>
    </div>
</body>
</html>
